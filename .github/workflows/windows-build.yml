name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  remote-server-tests:
    name: Remote Server Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: remote-server/package-lock.json

      - name: Install remote server dependencies
        run: npm --prefix remote-server ci

      - name: Test approval and command isolation
        run: npm --prefix remote-server test

  windows:
    name: Windows Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: obs-audio-monitor-assistant-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml

  mac:
    name: Mac Build
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build Mac app
        run: npm run dist:mac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: obs-audio-monitor-assistant-mac
          path: |
            release/*.zip
            release/*.zip.blockmap
            release/latest-mac.yml

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - remote-server-tests
      - windows
      - mac
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: obs-audio-monitor-assistant-*
          merge-multiple: true

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          files=(release-artifacts/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release files found."
            exit 1
          fi

          printf 'Release files:\n'
          printf '  %s\n' "${files[@]}"

          gh release delete latest --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
          gh release create latest "${files[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "OBS 音频检测助手 最新版" \
            --notes "此版本由 main 分支自动构建发布。包含 Windows 安装包和 Mac app 压缩包。" \
            --latest
