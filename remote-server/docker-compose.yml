services:
  obs-audio-remote:
    build: .
    container_name: obs-audio-remote
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "192.168.110.111:8088:8088"
    volumes:
      - ./data:/data
      - ./updates:/updates
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8088/health"]
      interval: 20s
      timeout: 3s
      retries: 3
      start_period: 10s
