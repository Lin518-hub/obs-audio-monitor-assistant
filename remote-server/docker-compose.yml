services:
  obs-audio-remote:
    build: .
    container_name: obs-audio-remote
    init: true
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "192.168.110.111:8088:8088"
    volumes:
      - ./data:/data
      - ./updates:/updates
      - ./tls:/run/tls:ro
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    stop_grace_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8088/health"]
      interval: 20s
      timeout: 3s
      retries: 3
      start_period: 10s
